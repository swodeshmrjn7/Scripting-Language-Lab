<!DOCTYPE html>
<html>
<head>
    <title>Odd and Even Numbers</title>
</head>
<body>

<h2>Numbers from 50 to 60</h2>

<button onclick="displayNumbers()">Display Numbers</button>

<p id="result"></p>

<script>
function displayNumbers() {

    let output = "";

    for (let i = 50; i <= 60; i++) {

        if (i % 2 != 0) {
            output += "<b>" + i + "</b><br>";
        } else {
            output += i + "<br>";
        }

    }

    document.getElementById("result").innerHTML = output;
}
</script>

</body>
</html>
