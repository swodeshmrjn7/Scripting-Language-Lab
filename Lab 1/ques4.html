<!DOCTYPE html>
<html>
<head>
    <title>Even or Odd</title>
</head>
<body>

<script>
    let number = parseInt(prompt("Enter a number:"));

    if (number % 2 === 0) {
        document.write(number + " is Even");
    } else {
        document.write(number + " is Odd");
    }
</script>

</body>
</html>
