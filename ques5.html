<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table of 7</title>

    <script>
      function showTable() {
        let table = "";

        for (let i = 1; i <= 10; i++) {
        table += "7 x " + i + " = " + (7 * i) + "\n";
        }

      alert(table);
     }
    </script>
</head>

<body>

    <h2>Multiplication Table of 7</h2>
    <button onclick="showTable()">Show Table</button>

</body>
</html>
